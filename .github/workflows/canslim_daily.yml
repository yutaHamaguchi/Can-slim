name: CANSLIM Daily Report (US Stocks)

on:
  schedule:
    # Run every weekday at 7:00 AM JST (22:00 UTC Sunday-Thursday)
    - cron: '0 22 * * 0-4'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 yfinance pandas

      - name: Run CANSLIM screener (fetch tickers)
        run: |
          python scripts/fetch_screener_data.py > tickers.json
          echo "Tickers found: $(cat tickers.json | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')"

      - name: Fetch stock data
        run: |
          python scripts/fetch_stock_data.py tickers.json > stock_data.json
          echo "Stocks fetched: $(cat stock_data.json | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')"

      - name: Calculate CANSLIM scores
        run: |
          python scripts/calculate_canslim.py stock_data.json > canslim_results.json
          echo "Top stocks:"
          cat canslim_results.json | python3 -c "
          import json, sys
          results = json.load(sys.stdin)
          for r in results[:5]:
              print(f\"  #{r['rank']} {r['code']} ({r['name'][:30]}): {r['totalScore']}/10\")
          "

      - name: Generate data.js
        run: |
          REPO_DIR=$(pwd) python scripts/generate_report.py canslim_results.json

      - name: Commit and push data.js
        run: |
          git config user.name "CANSLIM Bot"
          git config user.email "canslim-bot@github-actions"
          git add data.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            REPORT_DATE=$(date '+%Y年%m月%d日' -d 'TZ="Asia/Tokyo"' 2>/dev/null || date '+%Y年%m月%d日')
            git commit -m "📊 CANSLIMデイリーレポート ${REPORT_DATE}"
            git push
          fi
