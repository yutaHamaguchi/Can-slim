name: 📊 CANSLIM 米国株デイリーレポート

on:
  schedule:
    - cron: '0 22 * * 0-4' # 月〜金の朝7時JST (22:00 UTC)
  workflow_dispatch: # 手動実行用

jobs:
  update-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🚀 リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 🐍 Python環境のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 依存パッケージのインストール
        run: |
          pip install yfinance pandas requests beautifulsoup4

      - name: 🔍 TradingViewスクリーニング実行
        env:
          TRADINGVIEW_SESSIONID: ${{ secrets.TRADINGVIEW_SESSIONID }}
          TRADINGVIEW_SESSIONID_SIGN: ${{ secrets.TRADINGVIEW_SESSIONID_SIGN }}
        run: |
          python scripts/fetch_screener_data.py > tickers.json
          echo "取得銘柄: $(cat tickers.json)"

      - name: 📈 財務データ取得
        run: |
          # tickers.jsonの内容を引数として渡す
          python scripts/fetch_stock_data.py tickers.json > stock_data.json

      - name: 🔢 CANSLIMスコアリング
        run: |
          python scripts/calculate_canslim.py stock_data.json > results.json

      - name: 📄 レポート(data.js)生成
        run: |
          python scripts/generate_report.py results.json

      - name: 📤 GitHubに反映
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.js index.html scripts/ .github/
          git commit -m "📊 CANSLIMデイリーレポート $(date +'%Y年%m月%d日')" || echo "変更なし"
          git push
